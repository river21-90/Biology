function getStudyStatus() {
    const today = new Date();
    today.setHours(0, 0, 0, 0);
    const start = new Date(STUDY_START);
    start.setHours(0, 0, 0, 0);
    const end = new Date(STUDY_END);
    end.setHours(0, 0, 0, 0);
    const MS = 86400000;
    if (today < start) {
        return { phase: 'before', daysUntilStart: Math.round((start - today) / MS) };
    }
    if (today > end) {
        return { phase: 'after' };
    }
    const dayNumber = Math.round((today - start) / MS) + 1;
    const daysLeft = Math.round((end - today) / MS);
    const totalDays = Math.round((end - start) / MS) + 1; // 63
    const pct = Math.min(100, Math.round(dayNumber / totalDays * 100));
    const weekIdx = Math.min(8, Math.floor((dayNumber - 1) / 7));
    return { phase: 'during', dayNumber, daysLeft, totalDays, pct, weekIdx };
}
